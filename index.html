<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSI Engineering</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Montserrat', sans-serif;
}

/* HEADER */
.main-header {
  position: relative;
  height: 100vh;
  overflow: hidden;
  color: white;
}

/* VIDEO */
.bg-video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* OVERLAY */
.main-header::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
  z-index: 1;
  pointer-events: none;
}

/* NAVBAR */
.navbar {
  position: absolute;
  width: 100%;
  padding: 25px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 2;
}

/* LOGO */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 60px;
}

.logo span {
  font-size: 22px;
  font-weight: bold;
}

/* NAV LINKS (DESKTOP) */
.nav-links {
  display: flex;
  list-style: none;
  gap: 40px;
}

.nav-links a {
  text-decoration: none;
  color: white;
  font-size: 18px;
  position: relative;
  padding: 5px;
}

/* UNDERLINE EFFECT */
.nav-links a::after {
  content: "";
  width: 0%;
  height: 2px;
  background: #00ffff;
  position: absolute;
  bottom: -5px;
  left: 0;
  transition: 0.3s;
}

.nav-links a:hover::after {
  width: 100%;
}

/* HAMBURGER */
.menu-toggle {
  display: none;
  font-size: 28px;
  cursor: pointer;
  color: white;
  z-index: 3;
}

/* MOBILE MENU */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 70px;
    right: 0;
    background: #0d2c54;
    width: 220px;
    flex-direction: column;
    gap: 20px;
    padding: 20px;

    display: flex;
    transform: translateX(100%);
    transition: 0.3s ease;
  }

  .nav-links.active {
    transform: translateX(0);
  }

  .nav-links a {
    display: block;
    padding: 10px;
  }
}

/* HERO */
.hero-content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero-content h1 {
  font-size: 50px;
}

.hero-content p {
  font-size: 20px;
  color: #00ffff;
  margin: 20px 0;
}

.cta {
  padding: 15px 30px;
  background: #00ffff;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

</style>
</head>

<body>

<header class="main-header">

  <video autoplay muted loop class="bg-video">
    <source src="vid.mp4" type="video/mp4">
  </video>

  <div class="navbar">
    <div class="logo">
      <img src="logo.jpeg">
      <span>SSI ENGINEERING</span>
    </div>

    <div class="menu-toggle">☰</div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About Us</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Careers</a></li>
      <li><a href="#">Contact Us</a></li>
    </ul>
  </div>

  <div class="hero-content">
    <h1>Smart Industrial Automation</h1>
    <p>PLC | SCADA | HMI | Drives | IoT Solutions</p>
    <button class="cta">LEARN MORE</button>
  </div>

</header>

<script>
const toggle = document.querySelector('.menu-toggle');
const nav = document.querySelector('.nav-links');

toggle.addEventListener('click', () => {
  nav.classList.toggle('active');
});
</script>

</body>
</html>
